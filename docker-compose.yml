services:
  web:
    build:
      context: ./app
    container_name: mini-lab-web
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: mini-lab-redis
    volumes:
      - redis_data:/data

volumes:
  redis_data:
