name: CI Docker Mini Lab

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-and-test:
    name: Build et test avec Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Vérifier Docker et Docker Compose
        run: |
          docker --version
          docker compose version

      - name: Construire et démarrer les services
        run: |
          docker compose up -d --build

      - name: Afficher les containers
        run: |
          docker ps -a

      - name: Attendre le démarrage de l'application
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "Application prête."
              exit 0
            fi
            echo "Attente du démarrage de l'application..."
            sleep 3
          done
          echo "L'application n'a pas démarré à temps."
          exit 1

      - name: Vérifier l'endpoint /health
        run: |
          curl --fail http://localhost:5000/health

      - name: Vérifier l'endpoint principal
        run: |
          curl --fail http://localhost:5000/

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: |
          docker compose logs
          docker ps -a

      - name: Nettoyage
        if: always()
        run: |
          docker compose down -v
