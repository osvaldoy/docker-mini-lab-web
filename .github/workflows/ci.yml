name: CI Docker Mini Lab

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-and-test:
    name: Build et test de l'image Docker
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construire l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: docker-mini-lab:ci

      - name: Démarrer le container
        run: |
          docker run -d --name mini-lab-test -p 5000:5000 docker-mini-lab:ci

      - name: Attendre le démarrage de l'application
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "Application prête."
              exit 0
            fi
            sleep 2
          done
          echo "L'application n'a pas démarré à temps."
          exit 1

      - name: Vérifier l'endpoint /health
        run: |
          curl --fail http://localhost:5000/health

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: |
          docker logs mini-lab-test

      - name: Nettoyage
        if: always()
        run: |
          docker rm -f mini-lab-test || true
